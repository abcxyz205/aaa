<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Ôn Tập – Phát Triển Hệ Thống Web (Giữa Kỳ)</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #d97706;
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #273549;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ===== HEADER ===== */
  .header { background: linear-gradient(135deg, #312e81, #1e1b4b); padding: 24px 32px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 1.6rem; font-weight: 700; color: #c7d2fe; }
  .header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  /* ===== SETUP SCREEN ===== */
  #setup-screen { max-width: 720px; margin: 60px auto; padding: 0 20px; }
  .setup-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; }
  .setup-card h2 { font-size: 1.3rem; margin-bottom: 24px; color: var(--primary-light); }
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-bottom: 28px; }
  .topic-btn { background: var(--card2); border: 2px solid var(--border); border-radius: 8px; padding: 12px 16px; cursor: pointer; text-align: left; transition: all .2s; }
  .topic-btn:hover { border-color: var(--primary-light); }
  .topic-btn.selected { border-color: var(--primary); background: #312e81; }
  .topic-btn .t-name { font-weight: 600; font-size: 0.95rem; color: var(--text); }
  .topic-btn .t-count { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .row label { color: var(--muted); font-size: 0.9rem; white-space: nowrap; }
  select, input[type=range] { background: var(--card2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.9rem; }
  .btn-start { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 14px 36px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-start:hover { background: #4338ca; }
  .btn-start:disabled { background: var(--border); cursor: not-allowed; }
  #sel-count-label { color: var(--primary-light); font-weight: 600; min-width: 30px; }

  /* ===== QUIZ SCREEN ===== */
  #quiz-screen { display: none; max-width: 820px; margin: 0 auto; padding: 24px 20px 80px; }

  /* Progress */
  .progress-bar-wrap { background: var(--card2); border-radius: 999px; height: 8px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 999px; transition: width .4s; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--muted); margin-bottom: 20px; }

  /* Question card */
  .q-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; }
  .q-badge { display: inline-block; background: #312e81; color: var(--primary-light); border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; font-weight: 600; margin-bottom: 12px; }
  .q-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 20px; color: var(--text); }
  .q-text code { background: #0f172a; color: #7dd3fc; padding: 2px 6px; border-radius: 4px; font-family: 'Consolas', monospace; font-size: 0.92em; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; background: var(--card2); border: 2px solid var(--border); border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: all .18s; user-select: none; }
  .opt:hover:not(.disabled) { border-color: var(--primary-light); background: #1e2d4a; }
  .opt.selected { border-color: var(--primary); background: #1e2756; }
  .opt.correct { border-color: var(--success); background: #052e16; }
  .opt.wrong { border-color: var(--danger); background: #2d0a0a; }
  .opt.disabled { cursor: default; }
  .opt-letter { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: var(--text); flex-shrink: 0; }
  .opt.selected .opt-letter { background: var(--primary); }
  .opt.correct .opt-letter { background: var(--success); }
  .opt.wrong .opt-letter { background: var(--danger); }
  .opt-text { font-size: 0.95rem; line-height: 1.5; color: var(--text); }
  .opt-text code { background: #0a1929; color: #7dd3fc; padding: 1px 5px; border-radius: 3px; font-family: 'Consolas', monospace; font-size: 0.88em; }

  /* Feedback */
  .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.correct-fb { background: #052e16; border: 1px solid var(--success); color: #86efac; }
  .feedback.wrong-fb { background: #2d0a0a; border: 1px solid var(--danger); color: #fca5a5; }

  /* Nav buttons */
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
  .btn { border: none; border-radius: 8px; padding: 11px 24px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all .18s; }
  .btn-sec { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .btn-sec:hover { background: var(--border); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #4338ca; }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #15803d; }
  .score-live { font-size: 0.88rem; color: var(--muted); }

  /* ===== RESULT SCREEN ===== */
  #result-screen { display: none; max-width: 720px; margin: 40px auto; padding: 0 20px 80px; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; text-align: center; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; border: 6px solid; }
  .score-num { font-size: 2.6rem; font-weight: 800; }
  .score-label { font-size: 0.8rem; color: var(--muted); }
  .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 28px 0; }
  .stat-box { background: var(--card2); border-radius: 10px; padding: 18px; }
  .stat-box .s-val { font-size: 1.6rem; font-weight: 700; }
  .stat-box .s-lbl { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
  .topic-breakdown { text-align: left; margin-top: 28px; }
  .topic-breakdown h3 { color: var(--primary-light); margin-bottom: 14px; font-size: 1rem; }
  .tb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .tb-name { width: 180px; font-size: 0.85rem; color: var(--muted); flex-shrink: 0; }
  .tb-bar-wrap { flex: 1; background: var(--border); border-radius: 999px; height: 10px; overflow: hidden; }
  .tb-bar { height: 100%; border-radius: 999px; }
  .tb-score { font-size: 0.82rem; color: var(--text); min-width: 50px; text-align: right; }
  .result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }

  /* ===== REVIEW ===== */
  #review-screen { display: none; max-width: 820px; margin: 0 auto; padding: 24px 20px 80px; }
  .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .review-q { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 14px; }
  .review-q .status-tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; }
  .tag-correct { background: #052e16; color: #86efac; border: 1px solid var(--success); }
  .tag-wrong { background: #2d0a0a; color: #fca5a5; border: 1px solid var(--danger); }
  .tag-skip { background: #1c1a02; color: #fde68a; border: 1px solid #854d0e; }

  /* Misc */
  .hidden { display: none !important; }
  @media (max-width: 540px) {
    .result-stats { grid-template-columns: 1fr 1fr; }
    .tb-name { width: 130px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎯 Quiz Ôn Tập Giữa Kỳ</h1>
  <p>Phát Triển Hệ Thống Web – Phủ toàn bộ 9 chủ đề lý thuyết (9 file PDF)</p>
</div>

<!-- ===== SETUP ===== -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>⚙️ Tùy chọn bài thi</h2>

    <p style="color:var(--muted);font-size:.88rem;margin-bottom:16px;">Chọn chủ đề muốn ôn (mặc định tất cả):</p>
    <div class="topic-grid" id="topic-grid"></div>

    <div class="row">
      <label>Số câu hỏi:</label>
      <input type="range" id="q-count-range" min="10" max="200" step="5" value="200" oninput="updateCountLabel()" />
      <span id="sel-count-label">120</span> câu
    </div>
    <div class="row">
      <label>Thứ tự câu hỏi:</label>
      <select id="q-order">
        <option value="random">Ngẫu nhiên</option>
        <option value="sequential">Theo thứ tự</option>
      </select>
    </div>

    <button class="btn-start" id="btn-start" onclick="startQuiz()">🚀 Bắt đầu làm bài</button>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="quiz-screen">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-meta">
    <span id="prog-text">Câu 1 / 120</span>
    <span class="score-live" id="score-live">✅ 0 &nbsp; ❌ 0</span>
  </div>
  <div id="q-container"></div>
  <div class="nav-row">
    <button class="btn btn-sec" id="btn-prev" onclick="prevQ()">← Trước</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextQ()">Tiếp theo →</button>
    <button class="btn btn-success hidden" id="btn-finish" onclick="finishQuiz()">🏁 Nộp bài</button>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-screen">
  <div class="result-card">
    <h2 style="color:var(--primary-light);margin-bottom:20px;">📊 Kết Quả Bài Thi</h2>
    <div class="score-circle" id="score-circle">
      <span class="score-num" id="score-pct">0%</span>
      <span class="score-label">Điểm số</span>
    </div>
    <div class="result-stats">
      <div class="stat-box"><div class="s-val" id="r-correct" style="color:var(--success)">0</div><div class="s-lbl">Câu đúng</div></div>
      <div class="stat-box"><div class="s-val" id="r-wrong" style="color:var(--danger)">0</div><div class="s-lbl">Câu sai</div></div>
      <div class="stat-box"><div class="s-val" id="r-total">0</div><div class="s-lbl">Tổng câu</div></div>
    </div>
    <div class="topic-breakdown">
      <h3>📚 Kết quả theo chủ đề</h3>
      <div id="topic-breakdown-list"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-sec" onclick="showReview()">🔍 Xem lại bài làm</button>
      <button class="btn btn-primary" onclick="restartQuiz()">🔄 Làm lại</button>
      <button class="btn btn-sec" onclick="goSetup()">⚙️ Đổi cấu hình</button>
    </div>
  </div>
</div>

<!-- ===== REVIEW ===== -->
<div id="review-screen">
  <div class="review-header">
    <h2 style="color:var(--primary-light)">🔍 Xem lại bài làm</h2>
    <button class="btn btn-sec" onclick="showResult()">← Về kết quả</button>
  </div>
  <div id="review-list"></div>
</div>

<script>
// =====================================================================
// QUESTION BANK
// =====================================================================
const QUESTIONS = [

// ===========================
// CHỦ ĐỀ 1: JDBC
// ===========================
{ topic:"JDBC", q:"JDBC là viết tắt của gì?",
  opts:["Java Database Connectivity","Java Data Bridge Connector","Java Direct Base Connection","Jakarta Database Connector"],
  ans:0, explain:"JDBC = Java Database Connectivity – API cho phép Java tương tác với CSDL quan hệ." },

{ topic:"JDBC", q:"Bước đầu tiên trong quy trình kết nối JDBC là gì?",
  opts:["Gọi DriverManager.getConnection()","Khai báo Class.forName() để load driver","Tạo đối tượng Statement","Xử lý ResultSet"],
  ans:1, explain:"Bước 1: Load driver bằng Class.forName(\"com.mysql.cj.jdbc.Driver\"). Nếu không tìm thấy sẽ ném ClassNotFoundException." },

{ topic:"JDBC", q:"Định dạng URL kết nối MySQL qua JDBC là gì?",
  opts:["mysql://hostname:port/dbName","jdbc:mysql://hostname:port/dbName","jdbc://mysql/hostname:port/dbName","db:mysql://hostname/port/dbName"],
  ans:1, explain:"Cú pháp chuẩn: jdbc:mysql://hostname:port/databaseName" },

{ topic:"JDBC", q:"Loại Statement nào giúp chống SQL Injection hiệu quả nhất?",
  opts:["Statement","CallableStatement","PreparedStatement","BatchStatement"],
  ans:2, explain:"PreparedStatement dùng placeholder (?) nên tham số được xử lý an toàn, tránh SQL Injection." },

{ topic:"JDBC", q:"Phương thức executeQuery() được dùng cho loại lệnh SQL nào?",
  opts:["INSERT","UPDATE","DELETE","SELECT"],
  ans:3, explain:"executeQuery() dùng cho lệnh SELECT và trả về đối tượng ResultSet." },

{ topic:"JDBC", q:"Phương thức executeUpdate() trả về kiểu dữ liệu gì?",
  opts:["ResultSet","boolean","int (số hàng bị ảnh hưởng)","void"],
  ans:2, explain:"executeUpdate() trả về int là số lượng hàng bị ảnh hưởng bởi lệnh INSERT/UPDATE/DELETE." },

{ topic:"JDBC", q:"CallableStatement được dùng để làm gì?",
  opts:["Thực thi câu lệnh SELECT phức tạp","Gọi Stored Procedure trong database","Thực thi batch query","Tạo kết nối bảo mật"],
  ans:1, explain:"CallableStatement dùng để gọi Stored Procedure, cú pháp: { call procedureName(?) }" },

{ topic:"JDBC", q:"Để đăng ký tham số OUTPUT trong CallableStatement, ta dùng phương thức nào?",
  opts:["setOutParameter()","addOutParameter()","registerOutParameter()","declareOutParameter()"],
  ans:2, explain:"registerOutParameter(index, Types.INTEGER) dùng để khai báo tham số đầu ra." },

{ topic:"JDBC", q:"Tính chất ACID – chữ A (Atomicity) nghĩa là gì?",
  opts:["Dữ liệu luôn nhất quán sau transaction","Transaction không thể chia nhỏ – hoặc toàn bộ thành công hoặc toàn bộ thất bại","Transaction độc lập với nhau","Kết quả commit được lưu vĩnh viễn"],
  ans:1, explain:"Atomicity: Transaction là đơn vị không thể chia cắt – all or nothing." },

{ topic:"JDBC", q:"Tính chất nào đảm bảo kết quả sau commit không bị mất dù hệ thống gặp sự cố?",
  opts:["Atomicity","Consistency","Isolation","Durability"],
  ans:3, explain:"Durability (Tính Bền Vững): sau khi commit, dữ liệu được lưu vĩnh viễn, không thể bị xóa bởi lỗi hệ thống." },

{ topic:"JDBC", q:"Mặc định, JDBC có bật AutoCommit không?",
  opts:["Không, phải bật thủ công","Có, mỗi lệnh SQL tự động commit ngay","Phụ thuộc vào driver","Phụ thuộc vào hệ quản trị CSDL"],
  ans:1, explain:"Mặc định AutoCommit = true. Phải gọi conn.setAutoCommit(false) khi muốn tự quản lý transaction." },

{ topic:"JDBC", q:"Để hủy bỏ các thay đổi trong một transaction, ta gọi phương thức nào?",
  opts:["conn.undo()","conn.cancel()","conn.rollback()","conn.revert()"],
  ans:2, explain:"conn.rollback() hoàn tác toàn bộ thay đổi chưa commit trong transaction hiện tại." },

{ topic:"JDBC", q:"Batch Processing trong JDBC dùng để làm gì?",
  opts:["Phân trang kết quả truy vấn","Nhóm nhiều lệnh SQL thực thi một lần để giảm số lần truy cập DB","Kết nối song song đến nhiều database","Mã hóa dữ liệu truyền đi"],
  ans:1, explain:"Batch Processing gom nhiều SQL vào batch rồi executeBatch() một lần – tăng hiệu suất." },

{ topic:"JDBC", q:"Phương thức nào thực thi toàn bộ batch và trả về mảng số hàng bị ảnh hưởng?",
  opts:["runBatch()","commitBatch()","executeBatch()","flushBatch()"],
  ans:2, explain:"executeBatch() thực thi tất cả SQL trong batch và trả về int[] – mỗi phần tử là số hàng bị ảnh hưởng." },

{ topic:"JDBC", q:"ResultSet.TYPE_SCROLL_INSENSITIVE khác TYPE_FORWARD_ONLY ở điểm nào?",
  opts:["Nhanh hơn TYPE_FORWARD_ONLY","Con trỏ có thể di chuyển cả tiến và lùi, không phản chiếu thay đổi của thread khác","Tự động commit sau mỗi lần đọc","Hỗ trợ cập nhật dữ liệu trực tiếp"],
  ans:1, explain:"SCROLL_INSENSITIVE: di chuyển 2 chiều nhưng không phản ánh thay đổi từ thread khác. Mặc định là FORWARD_ONLY (chỉ tiến)." },

{ topic:"JDBC", q:"Phương thức absolute(5) của ResultSet làm gì?",
  opts:["Di chuyển con trỏ tiến thêm 5 hàng từ vị trí hiện tại","Di chuyển con trỏ về hàng thứ 5 tính từ đầu","Di chuyển con trỏ về hàng thứ 5 tính từ cuối","Đặt giới hạn kết quả tối đa là 5"],
  ans:1, explain:"absolute(n) di chuyển con trỏ đến hàng thứ n (đếm từ 1). Nếu n âm, đếm từ cuối." },

{ topic:"JDBC", q:"Exception nào bị ném khi Class.forName() không tìm thấy driver class?",
  opts:["SQLException","IOException","ClassNotFoundException","DriverNotFoundException"],
  ans:2, explain:"Class.forName() ném ClassNotFoundException nếu class driver không tồn tại trong classpath." },

{ topic:"JDBC", q:"Tính chất Isolation trong ACID đảm bảo điều gì?",
  opts:["Mỗi transaction chạy độc lập, không nhìn thấy kết quả của transaction chưa hoàn thành khác","Dữ liệu luôn ở trạng thái hợp lệ","Kết quả không thể mất","Hoặc tất cả thành công hoặc tất cả thất bại"],
  ans:0, explain:"Isolation: các transaction đồng thời được cô lập – transaction A không thấy dữ liệu chưa commit của transaction B." },

// ===========================
// CHỦ ĐỀ 2: HIBERNATE
// ===========================
{ topic:"Hibernate", q:"ORM là viết tắt của gì?",
  opts:["Object Relational Mapping","Open Resource Model","Object Request Manager","Optimized Record Management"],
  ans:0, explain:"ORM = Object-Relational Mapping – kỹ thuật ánh xạ giữa đối tượng Java và bảng trong CSDL quan hệ." },

{ topic:"Hibernate", q:"Annotation nào đánh dấu một class Java là Persistent Class trong Hibernate?",
  opts:["@Table","@Persistent","@Entity","@Model"],
  ans:2, explain:"@Entity (từ jakarta.persistence.*) đánh dấu class là Persistent Class – được Hibernate quản lý." },

{ topic:"Hibernate", q:"@GeneratedValue(strategy = GenerationType.IDENTITY) có nghĩa là gì?",
  opts:["Hibernate tự sinh UUID","Database tự tăng giá trị primary key","Dùng sequence của database","Dùng bảng riêng để theo dõi sequence"],
  ans:1, explain:"GenerationType.IDENTITY: cơ sở dữ liệu tự tăng giá trị (AUTO_INCREMENT trong MySQL)." },

{ topic:"Hibernate", q:"Fetch mặc định của @ManyToOne là gì?",
  opts:["LAZY","EAGER","BOTH","AUTO"],
  ans:1, explain:"@ManyToOne mặc định là FetchType.EAGER – load đối tượng liên quan ngay lập tức." },

{ topic:"Hibernate", q:"Fetch mặc định của @OneToMany là gì?",
  opts:["EAGER","LAZY","NONE","MANUAL"],
  ans:1, explain:"@OneToMany mặc định là FetchType.LAZY – chỉ load dữ liệu liên quan khi cần. Tốt hơn về hiệu suất." },

{ topic:"Hibernate", q:"Trong Hibernate, đối tượng ở trạng thái 'transient' nghĩa là gì?",
  opts:["Đã được lưu vào database","Đã gắn với Session nhưng chưa commit","Mới tạo, chưa gắn với Session nào","Đã bị xóa khỏi database"],
  ans:2, explain:"Transient: object vừa tạo bằng new, không có kết nối với Session, chưa được Hibernate quản lý." },

{ topic:"Hibernate", q:"Phương thức nào chuyển object từ trạng thái transient sang persistent?",
  opts:["session.save()","session.persist()","session.attach()","session.connect()"],

  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  const counts = {};
  QUESTIONS.forEach(q => { counts[q.topic] = (counts[q.topic]||0)+1; });
  allTopics.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'topic-btn selected';
    btn.dataset.topic = t;
    btn.innerHTML = `<div class="t-name">${t}</div><div class="t-count">${counts[t]} câu</div>`;
    btn.onclick = () => toggleTopic(btn, t);
    grid.appendChild(btn);
  });
  updateCountLabel();
}

function toggleTopic(btn, topic) {
  if (selectedTopics.has(topic)) {
    if (selectedTopics.size === 1) return; // at least 1
    selectedTopics.delete(topic);
    btn.classList.remove('selected');
  } else {
    selectedTopics.add(topic);
    btn.classList.add('selected');
  }
  updateMaxRange();
}

function updateMaxRange() {
  updateCountLabel();
}

function updateCountLabel() {
  const pool = QUESTIONS.filter(q => selectedTopics.has(q.topic));
  const range = document.getElementById('q-count-range');
  const count = parseInt(range.value);
  const repeats = count > pool.length ? Math.ceil(count / pool.length) : 1;
  const repeatNote = repeats > 1 ? ` <span style="color:var(--warning);font-size:.8rem">(lặp ~${repeats}x)</span>` : '';
  document.getElementById('sel-count-label').innerHTML = count + repeatNote;
}

function startQuiz() {
  const count = parseInt(document.getElementById('q-count-range').value);
  const order = document.getElementById('q-order').value;
  let pool = QUESTIONS.filter(q => selectedTopics.has(q.topic));

  // Build question list – repeat pool if count exceeds pool size
  let result = [];
  while (result.length < count) {
    const batch = order === 'random' ? shuffle(pool) : [...pool];
    result = result.concat(batch);
  }
  // Clone each question object so shuffle state is independent per slot
  quizQuestions = result.slice(0, count).map(q => ({ ...q, _shuffled: false }));

  answers = {};
  correct = 0; wrong = 0;
  current = 0;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// =====================================================================
// QUIZ RENDER
// =====================================================================
function renderQuestion() {
  const q = quizQuestions[current];
  const total = quizQuestions.length;
  const answered = Object.keys(answers).length;

  // Progress
  document.getElementById('prog-fill').style.width = ((current+1)/total*100)+'%';
  document.getElementById('prog-text').textContent = `Câu ${current+1} / ${total}`;
  document.getElementById('score-live').innerHTML = `✅ ${correct} &nbsp; ❌ ${wrong}`;

  // Nav buttons
  document.getElementById('btn-prev').disabled = current === 0;
  const isLast = current === total - 1;
  document.getElementById('btn-next').classList.toggle('hidden', isLast);
  document.getElementById('btn-finish').classList.toggle('hidden', !isLast);

  // Shuffle options for display
  let optIndices = q.opts.map((_, i) => i);
  if (!q._shuffled) {
    q._shuffleMap = shuffle(optIndices); // display order → original index
    q._shuffled = true;
  }

  const already = answers[current];
  const answered_q = already !== undefined;

  let html = `<div class="q-card">
    <div class="q-badge">📚 ${q.topic}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">`;

  const letters = ['A','B','C','D'];
  q._shuffleMap.forEach((origIdx, displayIdx) => {
    const letter = letters[displayIdx];
    const isCorrect = origIdx === q.ans;
    let cls = 'opt';
    if (answered_q) {
      cls += ' disabled';
      if (origIdx === already) cls += (isCorrect ? ' correct' : ' wrong');
      else if (isCorrect) cls += ' correct';
    }
    const optText = q.opts[origIdx].replace(/`([^`]+)`/g, '<code>$1</code>');
    html += `<div class="${cls}" onclick="selectOpt(${origIdx})">
      <div class="opt-letter">${letter}</div>
      <div class="opt-text">${optText}</div>
    </div>`;
  });

  html += `</div>`;

  // Feedback
  if (answered_q) {
    const isCorrect = already === q.ans;
    html += `<div class="feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}" style="display:block">
      ${isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!'} ${q.explain}
    </div>`;
  }

  html += `</div>`;
  document.getElementById('q-container').innerHTML = html;
}

function selectOpt(origIdx) {
  if (answers[current] !== undefined) return; // already answered
  const q = quizQuestions[current];
  answers[current] = origIdx;
  if (origIdx === q.ans) correct++;
  else wrong++;
  renderQuestion();
}

function nextQ() {
  if (answers[current] === undefined) answers[current] = -1; // skip
  if (current < quizQuestions.length - 1) { current++; renderQuestion(); }
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}

function finishQuiz() {
  // mark unanswered as skip
  for (let i = 0; i < quizQuestions.length; i++) {
    if (answers[i] === undefined) answers[i] = -1;
  }
  showResult();
}

// =====================================================================
// RESULT
// =====================================================================
function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = quizQuestions.length;
  let c = 0, w = 0;
  quizQuestions.forEach((q,i) => {
    if (answers[i] === q.ans) c++;
    else if (answers[i] !== -1) w++;
  });
  correct = c; wrong = w;
  const pct = Math.round(c/total*100);

  document.getElementById('r-correct').textContent = c;
  document.getElementById('r-wrong').textContent = w;
  document.getElementById('r-total').textContent = total;
  document.getElementById('score-pct').textContent = pct + '%';

  const circle = document.getElementById('score-circle');
  const color = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
  circle.style.borderColor = color;
  circle.querySelector('.score-num').style.color = color;

  // Per-topic breakdown
  const topicStats = {};
  quizQuestions.forEach((q,i) => {
    if (!topicStats[q.topic]) topicStats[q.topic] = {total:0, correct:0};
    topicStats[q.topic].total++;
    if (answers[i] === q.ans) topicStats[q.topic].correct++;
  });

  let html = '';
  Object.entries(topicStats).forEach(([topic, s]) => {
    const p = Math.round(s.correct/s.total*100);
    const barColor = p >= 80 ? '#16a34a' : p >= 50 ? '#d97706' : '#dc2626';
    html += `<div class="tb-row">
      <div class="tb-name">${topic}</div>
      <div class="tb-bar-wrap"><div class="tb-bar" style="width:${p}%;background:${barColor}"></div></div>
      <div class="tb-score">${s.correct}/${s.total}</div>
    </div>`;
  });
  document.getElementById('topic-breakdown-list').innerHTML = html;
}

// =====================================================================
// REVIEW
// =====================================================================
function showReview() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'block';

  let html = '';
  quizQuestions.forEach((q, i) => {
    const userAns = answers[i];
    const isSkip = userAns === -1;
    const isCorrect = userAns === q.ans;
    let tagClass = isSkip ? 'tag-skip' : isCorrect ? 'tag-correct' : 'tag-wrong';
    let tagText = isSkip ? '⏭ Bỏ qua' : isCorrect ? '✅ Đúng' : '❌ Sai';

    const letters = ['A','B','C','D'];
    let optsHtml = '';
    q._shuffleMap.forEach((origIdx, displayIdx) => {
      const letter = letters[displayIdx];
      const isAns = origIdx === q.ans;
      const isUser = origIdx === userAns;
      let style = 'background:var(--card2);border:2px solid var(--border);';
      if (isAns) style = 'background:#052e16;border:2px solid var(--success);';
      if (isUser && !isAns) style = 'background:#2d0a0a;border:2px solid var(--danger);';
      optsHtml += `<div style="${style}border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start">
        <span style="font-weight:700;min-width:20px;color:var(--muted)">${letter}.</span>
        <span>${q.opts[origIdx]}</span>
        ${isAns ? '<span style="color:var(--success);margin-left:auto">✓ Đáp án</span>' : ''}
        ${isUser && !isAns ? '<span style="color:var(--danger);margin-left:auto">✗ Bạn chọn</span>' : ''}
      </div>`;
    });

    html += `<div class="review-q">
      <div class="status-tag ${tagClass}">${tagText}</div>
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">Câu ${i+1} · ${q.topic}</div>
      <div style="font-size:.95rem;margin-bottom:12px;line-height:1.6">${q.q}</div>
      ${optsHtml}
      <div style="margin-top:10px;padding:10px 14px;background:#0f172a;border-radius:6px;font-size:.85rem;color:var(--primary-light)">
        💡 ${q.explain}
      </div>
    </div>`;
  });
  document.getElementById('review-list').innerHTML = html;
}

function restartQuiz() {
  startQuiz();
}

function goSetup() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}

// =====================================================================
// INIT
// =====================================================================
initSetup();
</script>
</body>
</html>
