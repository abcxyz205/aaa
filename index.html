{topic:"ReactJS",q:"Props trong React component có đặc điểm gì?",
opts:["Có thể thay đổi từ component con","Lưu trữ state nội bộ component","Immutable – component con không được phép thay đổi","Chỉ dùng được trong class component"],
ans:2,explain:"Props: immutable, truyền một chiều từ cha xuống con. Component con KHÔNG được sửa props. Muốn thay đổi phải dùng callback từ cha."},

{topic:"ReactJS",q:"State trong React khi thay đổi sẽ gây ra điều gì?",
opts:["Tải lại toàn bộ trang browser","Ghi dữ liệu ngay vào database","Component re-render lại","Không có gì xảy ra ngay lập tức"],
ans:2,explain:"Khi state thay đổi (setState/useState setter), React schedule re-render của component và các component con. Batched updates trong event handlers."},

{topic:"ReactJS",q:"Class component trong React yêu cầu điều gì bắt buộc?",
opts:["Phải có constructor với props","Phải dùng TypeScript","Phải khai báo state","Phải extends React.Component và có render()"],
ans:3,explain:"Class component: bắt buộc extends React.Component và có method render() trả về JSX. Constructor và state là tùy chọn."},

{topic:"ReactJS",q:"super(props) trong constructor của class component dùng để làm gì?",
opts:["Khởi tạo state ban đầu","Đăng ký lifecycle methods","Gọi constructor React.Component – thiếu thì this.props undefined trong constructor","Import component cha"],
ans:2,explain:"super(props): gọi constructor của React.Component với props → React lưu vào this.props. Nếu không, this.props = undefined trong constructor."},

{topic:"ReactJS",q:"useState hook trả về những gì?",
opts:["Chỉ giá trị state hiện tại","Object với get và set method","Một mảng [giá trị state, hàm setter]","Promise resolve thành giá trị"],
ans:2,explain:"useState(initValue) trả về [currentValue, setterFunction]. Ví dụ: const [count, setCount] = useState(0). Dùng array destructuring."},

{topic:"ReactJS",q:"useEffect(callback, []) chạy khi nào?",
opts:["Mỗi lần component render","Chỉ khi state thay đổi","Chỉ khi props thay đổi","Một lần duy nhất sau lần mount đầu tiên"],
ans:3,explain:"useEffect(fn, []): dependency rỗng → chỉ chạy 1 lần sau mount. Tương đương componentDidMount. Không truyền deps → chạy mỗi render."},

{topic:"ReactJS",q:"useEffect không có tham số dependency thứ hai chạy khi nào?",
opts:["Chỉ một lần khi mount","Khi component unmount","Mỗi lần component render","Chỉ khi state thay đổi"],
ans:2,explain:"useEffect(fn) không có deps: chạy SAU MỖI LẦN render. Tương đương componentDidMount + componentDidUpdate kết hợp."},

{topic:"ReactJS",q:"Cleanup function trong useEffect trả về để làm gì?",
opts:["Khởi tạo state tiếp theo","Truyền data cho component cha","Ngăn memory leak – dọn dẹp subscription/timer khi unmount","Cập nhật DOM trực tiếp"],
ans:2,explain:"return () => cleanup(): chạy khi component unmount hoặc trước khi effect chạy lại. Dùng để clearTimeout, unsubscribe, cancel request."},

{topic:"ReactJS",q:"React Hooks được giới thiệu từ phiên bản React nào?",
opts:["React 15.0","React 17.0","React 16.3","React 16.8"],
ans:3,explain:"React 16.8 (tháng 2/2019): ra mắt Hooks. useState, useEffect, useContext, useRef, useMemo, useCallback, useReducer đều được giới thiệu lần đầu."},

{topic:"ReactJS",q:"useRef có thể dùng cho mục đích nào?",
opts:["Tạo global state dùng chung","Thay thế hoàn toàn useState","Truy cập DOM element và giữ giá trị giữa renders không gây re-render","Tối ưu expensive computation"],
ans:2,explain:"useRef: (1) ref={myRef} → myRef.current trỏ đến DOM node sau mount. (2) lưu giá trị giữa renders không trigger re-render (khác useState)."},

{topic:"ReactJS",q:"useContext giải quyết vấn đề gì trong React?",
opts:["Tối ưu hiệu suất render","Quản lý side effects","Gọi API bất đồng bộ","Tránh prop drilling khi share state nhiều cấp"],
ans:3,explain:"useContext: đọc giá trị Context mà không cần truyền props qua từng cấp trung gian (prop drilling). Kết hợp createContext + Provider."},

{topic:"ReactJS",q:"React.memo() dùng để làm gì?",
opts:["Memoize kết quả tính toán","Bọc component tránh re-render khi props không đổi","Tạo memoized selector","Cache kết quả API"],
ans:1,explain:"React.memo(Component): HOC – nếu props không thay đổi (shallow comparison) thì skip re-render. Tương tự shouldComponentUpdate trong class component."},

{topic:"ReactJS",q:"useMemo và useCallback khác nhau như thế nào?",
opts:["Hoàn toàn giống nhau","useMemo nhanh hơn useCallback","useMemo memoize GIÁ TRỊ; useCallback memoize FUNCTION","useCallback chỉ cho async function"],
ans:2,explain:"useMemo(fn, deps): cache giá trị trả về của fn. useCallback(fn, deps): cache bản thân fn. useCallback(fn) ≡ useMemo(() => fn)."},

{topic:"ReactJS",q:"React.memo kết hợp useCallback để giải quyết vấn đề gì?",
opts:["Giảm kích thước bundle","Tăng tốc độ API call","Tránh re-render component con khi function prop được tạo mới mỗi render","Quản lý state phức tạp"],
ans:2,explain:"Không có useCallback: function prop mới mỗi render → React.memo thấy props thay đổi → re-render. Với useCallback: function reference ổn định → memo hoạt động đúng."},

{topic:"ReactJS",q:"useReducer(reducer, initState) trả về những gì?",
opts:["Chỉ state hiện tại","reducer function và state","State hiện tại và dispatch function","initState và action"],
ans:2,explain:"useReducer: trả về [state, dispatch]. Gọi dispatch({type: 'INCREMENT', payload: 1}) → reducer(currentState, action) → new state."},

{topic:"ReactJS",q:"React Fragment <></> dùng để làm gì?",
opts:["Lazy load component","Tạo context provider","Nhóm nhiều elements mà không thêm DOM node thừa","Tạo portal ngoài root"],
ans:2,explain:"Fragment: return multiple elements không cần wrapper <div>. <></> là shorthand. Không thêm DOM node thừa → HTML gọn hơn."},

{topic:"ReactJS",q:"Mỗi item trong list React cần prop 'key' vì lý do gì?",
opts:["Để CSS styling riêng mỗi item","Để submit form","Để React phân biệt items khi reconcile Virtual DOM","Để truy cập item từ parent"],
ans:2,explain:"key: React dùng để track từng item khi list thay đổi (thêm/xóa/reorder). key ổn định (id từ data) tránh bugs. Không dùng index làm key khi list có thể reorder."},

{topic:"ReactJS",q:"componentDidMount() trong lifecycle tương đương hook nào?",
opts:["useEffect(fn) – không có deps","useEffect(fn, [state])","useLayoutEffect(fn)","useEffect(fn, []) – deps rỗng"],
ans:3,explain:"componentDidMount() chạy 1 lần sau mount = useEffect(fn, []). componentDidUpdate = useEffect(fn, [deps]). componentWillUnmount = cleanup function trong useEffect."},

{topic:"ReactJS",q:"shouldComponentUpdate() trả về false có tác dụng gì?",
opts:["Component bị unmount ngay","Component re-render 2 lần","Component KHÔNG re-render, tối ưu performance","Throw error về state"],
ans:2,explain:"shouldComponentUpdate(nextProps, nextState): return false → React skip render() và componentDidUpdate(). React.memo là equivalent cho function component."},

{topic:"ReactJS",q:"getDerivedStateFromProps() là static method, nghĩa là gì?",
opts:["Chạy nhanh hơn instance method","Không có this context, chỉ nhận props và state","Gọi tự động sau constructor","Chỉ gọi trong mounting phase"],
ans:1,explain:"static method: không có this. Signature: static getDerivedStateFromProps(props, state) → return partial state object hoặc null. Pure function, no side effects."},

{topic:"ReactJS",q:"Tại sao không nên mutate state trực tiếp (ví dụ state.count++)?",
opts:["Vì state là const trong JavaScript","Vì làm chậm render","Vì React không detect thay đổi, không trigger re-render","Vì JavaScript không cho phép"],
ans:2,explain:"React so sánh reference để detect thay đổi. Mutate trực tiếp → cùng reference → React không biết state đã đổi → không re-render. Phải dùng setter."},

{topic:"ReactJS",q:"setCount(prev => prev + 1) tốt hơn setCount(count + 1) khi nào?",
opts:["Khi state là object","Khi dùng trong useCallback","Khi count cần tăng nhiều lần trong cùng event","Không có sự khác biệt"],
ans:2,explain:"Functional update: đảm bảo dùng giá trị state MỚI NHẤT, tránh stale closure bug khi nhiều updates xảy ra trước khi React re-render."},

{topic:"ReactJS",q:"Khi Context Provider value thay đổi, điều gì xảy ra?",
opts:["Chỉ Provider component re-render","Chỉ component con trực tiếp re-render","Tất cả Consumer (useContext) re-render kể cả bị bọc bởi memo","Không có component nào re-render"],
ans:2,explain:"Context value thay đổi: TẤT CẢ components đang useContext(MyContext) re-render. React.memo không ngăn được – memo so sánh props, không phải context."},

{topic:"ReactJS",q:"BrowserRouter trong React Router v6 dùng để làm gì?",
opts:["Tạo server-side routing","Xử lý routing client-side dựa trên History API","Cache các route đã visit","Tạo hash-based routing"],
ans:1,explain:"BrowserRouter: wrap toàn bộ app, xử lý routing client-side với HTML5 History API. HashRouter: dùng #hash trong URL (không cần server config)."},

{topic:"ReactJS",q:"Trong React Router v6, tại sao dùng Routes thay vì Switch?",
opts:["Switch bị xóa khỏi React","Routes hỗ trợ matching chính xác và nested routes tốt hơn","Routes nhanh hơn Switch","Switch không tương thích v6"],
ans:1,explain:"React Router v6: Routes thay Switch. Routes: exact matching mặc định, hỗ trợ nested routes, loại bỏ component prop (dùng element prop)."},

{topic:"ReactJS",q:"<Outlet /> trong React Router v6 dùng để làm gì?",

{topic:"ReactJS",q:"useParams() trong React Router trả về gì?",

{topic:"ReactJS",q:"useSearchParams() trong React Router dùng để làm gì?",

ans:2,explain:"useSearchParams(): const [q] = useSearchParams(). URL /search?kw=react → q.get(\"kw\") = \"react\". Tương tự URLSearchParams của browser."},

{topic:"ReactJS",q:"useNavigate() trong React Router v6 thay thế hook nào của v5?",

{topic:"ReactJS",q:"axios.create({baseURL: 'http://localhost:8080'}) dùng để làm gì?",

{topic:"ReactJS",q:"event.preventDefault() trong form submit dùng để làm gì?",

{topic:"ReactJS",q:"Tại sao mỗi item trong list React cần key là id từ data thay vì index?",

{topic:"ReactJS",q:"getSnapshotBeforeUpdate() trong lifecycle class component dùng để làm gì?",

// =====================================================================
// APP STATE
// =====================================================================
let allTopics = [...new Set(QUESTIONS.map(q => q.topic))];
let selectedTopics = new Set(allTopics);
let quizQuestions = [];
let current = 0;
let answers = {}; // index → chosen option index (-1 = skip)
let correct = 0, wrong = 0;

// =====================================================================
// SETUP
// =====================================================================
function initSetup() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  const counts = {};
  QUESTIONS.forEach(q => { counts[q.topic] = (counts[q.topic]||0)+1; });
  allTopics.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'topic-btn selected';
    btn.dataset.topic = t;
    btn.innerHTML = `<div class="t-name">${t}</div><div class="t-count">${counts[t]} câu</div>`;
    btn.onclick = () => toggleTopic(btn, t);
    grid.appendChild(btn);
  });
  updateCountLabel();
}

function toggleTopic(btn, topic) {
  if (selectedTopics.has(topic)) {
    if (selectedTopics.size === 1) return; // at least 1
    selectedTopics.delete(topic);
    btn.classList.remove('selected');
  } else {
    selectedTopics.add(topic);
    btn.classList.add('selected');
  }
  updateMaxRange();
}

function updateMaxRange() {
  updateCountLabel();
}

function updateCountLabel() {
  const pool = QUESTIONS.filter(q => selectedTopics.has(q.topic));
  const range = document.getElementById('q-count-range');
  const count = parseInt(range.value);
  const repeats = count > pool.length ? Math.ceil(count / pool.length) : 1;
  const repeatNote = repeats > 1 ? ` <span style="color:var(--warning);font-size:.8rem">(lặp ~${repeats}x)</span>` : '';
  document.getElementById('sel-count-label').innerHTML = count + repeatNote;
}

function startQuiz() {
  const count = parseInt(document.getElementById('q-count-range').value);
  const order = document.getElementById('q-order').value;
  let pool = QUESTIONS.filter(q => selectedTopics.has(q.topic));

  // Build question list – repeat pool if count exceeds pool size
  let result = [];
  while (result.length < count) {
    const batch = order === 'random' ? shuffle(pool) : [...pool];
    result = result.concat(batch);
  }
  // Clone each question object so shuffle state is independent per slot
  quizQuestions = result.slice(0, count).map(q => ({ ...q, _shuffled: false }));

  answers = {};
  correct = 0; wrong = 0;
  current = 0;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// =====================================================================
// QUIZ RENDER
// =====================================================================
function renderQuestion() {
  const q = quizQuestions[current];
  const total = quizQuestions.length;
  const answered = Object.keys(answers).length;

  // Progress
  document.getElementById('prog-fill').style.width = ((current+1)/total*100)+'%';
  document.getElementById('prog-text').textContent = `Câu ${current+1} / ${total}`;
  document.getElementById('score-live').innerHTML = `✅ ${correct} &nbsp; ❌ ${wrong}`;

  // Nav buttons
  document.getElementById('btn-prev').disabled = current === 0;
  const isLast = current === total - 1;
  document.getElementById('btn-next').classList.toggle('hidden', isLast);
  document.getElementById('btn-finish').classList.toggle('hidden', !isLast);

  // Shuffle options for display
  let optIndices = q.opts.map((_, i) => i);
  if (!q._shuffled) {
    q._shuffleMap = shuffle(optIndices); // display order → original index
    q._shuffled = true;
  }

  const already = answers[current];
  const answered_q = already !== undefined;

  let html = `<div class="q-card">
    <div class="q-badge">📚 ${q.topic}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">`;

  const letters = ['A','B','C','D'];
  q._shuffleMap.forEach((origIdx, displayIdx) => {
    const letter = letters[displayIdx];
    const isCorrect = origIdx === q.ans;
    let cls = 'opt';
    if (answered_q) {
      cls += ' disabled';
      if (origIdx === already) cls += (isCorrect ? ' correct' : ' wrong');
      else if (isCorrect) cls += ' correct';
    }
    const optText = q.opts[origIdx].replace(/`([^`]+)`/g, '<code>$1</code>');
    html += `<div class="${cls}" onclick="selectOpt(${origIdx})">
      <div class="opt-letter">${letter}</div>
      <div class="opt-text">${optText}</div>
    </div>`;
  });

  html += `</div>`;

  // Feedback
  if (answered_q) {
    const isCorrect = already === q.ans;
    html += `<div class="feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}" style="display:block">
      ${isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!'} ${q.explain}
    </div>`;
  }

  html += `</div>`;
  document.getElementById('q-container').innerHTML = html;
}

function selectOpt(origIdx) {
  if (answers[current] !== undefined) return; // already answered
  const q = quizQuestions[current];
  answers[current] = origIdx;
  if (origIdx === q.ans) correct++;
  else wrong++;
  renderQuestion();
}

function nextQ() {
  if (answers[current] === undefined) answers[current] = -1; // skip
  if (current < quizQuestions.length - 1) { current++; renderQuestion(); }
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}

function finishQuiz() {
  // mark unanswered as skip
  for (let i = 0; i < quizQuestions.length; i++) {
    if (answers[i] === undefined) answers[i] = -1;
  }
  showResult();
}

// =====================================================================
// RESULT
// =====================================================================
function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = quizQuestions.length;
  let c = 0, w = 0;
  quizQuestions.forEach((q,i) => {
    if (answers[i] === q.ans) c++;
    else if (answers[i] !== -1) w++;
  });
  correct = c; wrong = w;
  const pct = Math.round(c/total*100);

  document.getElementById('r-correct').textContent = c;
  document.getElementById('r-wrong').textContent = w;
  document.getElementById('r-total').textContent = total;
  document.getElementById('score-pct').textContent = pct + '%';

  const circle = document.getElementById('score-circle');
  const color = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
  circle.style.borderColor = color;
  circle.querySelector('.score-num').style.color = color;

  // Per-topic breakdown
  const topicStats = {};
  quizQuestions.forEach((q,i) => {
    if (!topicStats[q.topic]) topicStats[q.topic] = {total:0, correct:0};
    topicStats[q.topic].total++;
    if (answers[i] === q.ans) topicStats[q.topic].correct++;
  });

  let html = '';
  Object.entries(topicStats).forEach(([topic, s]) => {
    const p = Math.round(s.correct/s.total*100);
    const barColor = p >= 80 ? '#16a34a' : p >= 50 ? '#d97706' : '#dc2626';
    html += `<div class="tb-row">
      <div class="tb-name">${topic}</div>
      <div class="tb-bar-wrap"><div class="tb-bar" style="width:${p}%;background:${barColor}"></div></div>
      <div class="tb-score">${s.correct}/${s.total}</div>
    </div>`;
  });
  document.getElementById('topic-breakdown-list').innerHTML = html;
}

// =====================================================================
// REVIEW
// =====================================================================
function showReview() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'block';

  let html = '';
  quizQuestions.forEach((q, i) => {
    const userAns = answers[i];
    const isSkip = userAns === -1;
    const isCorrect = userAns === q.ans;
    let tagClass = isSkip ? 'tag-skip' : isCorrect ? 'tag-correct' : 'tag-wrong';
    let tagText = isSkip ? '⏭ Bỏ qua' : isCorrect ? '✅ Đúng' : '❌ Sai';

    const letters = ['A','B','C','D'];
    let optsHtml = '';
    q._shuffleMap.forEach((origIdx, displayIdx) => {
      const letter = letters[displayIdx];
      const isAns = origIdx === q.ans;
      const isUser = origIdx === userAns;
      let style = 'background:var(--card2);border:2px solid var(--border);';
      if (isAns) style = 'background:#052e16;border:2px solid var(--success);';
      if (isUser && !isAns) style = 'background:#2d0a0a;border:2px solid var(--danger);';
      optsHtml += `<div style="${style}border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start">
        <span style="font-weight:700;min-width:20px;color:var(--muted)">${letter}.</span>
        <span>${q.opts[origIdx]}</span>
        ${isAns ? '<span style="color:var(--success);margin-left:auto">✓ Đáp án</span>' : ''}
        ${isUser && !isAns ? '<span style="color:var(--danger);margin-left:auto">✗ Bạn chọn</span>' : ''}
      </div>`;
    });

    html += `<div class="review-q">
      <div class="status-tag ${tagClass}">${tagText}</div>
      <div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">Câu ${i+1} · ${q.topic}</div>
      <div style="font-size:.95rem;margin-bottom:12px;line-height:1.6">${q.q}</div>
      ${optsHtml}
      <div style="margin-top:10px;padding:10px 14px;background:#0f172a;border-radius:6px;font-size:.85rem;color:var(--primary-light)">
        💡 ${q.explain}
      </div>
    </div>`;
  });
  document.getElementById('review-list').innerHTML = html;
}

function restartQuiz() {
  startQuiz();
}

function goSetup() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}

// =====================================================================
// INIT
// =====================================================================
initSetup();
</script>
</body>
</html>
